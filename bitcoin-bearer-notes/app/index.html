<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoinPack - Bitcoin Bearer Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --neo-bg: #111827;
      --neo-bg-deep: #0b1220;
      --neo-surface: #151f32;
      --neo-surface-soft: #1b2940;
      --neo-raised: #202f49;
      --neo-inset: #0c1423;
      --neo-text: #f8fafc;
      --neo-muted: #9aa8bd;
      --neo-faint: #64748b;
      --neo-amber: #f59e0b;
      --neo-orange: #f97316;
      --neo-green: #34d399;
      --neo-red: #fb7185;
      --neo-ring: rgba(245, 158, 11, 0.42);
      --neo-shadow-dark: rgba(2, 6, 23, 0.78);
      --neo-shadow-light: rgba(148, 163, 184, 0.13);
      --neo-border: rgba(255, 255, 255, 0.065);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: var(--neo-text);
      background:
        radial-gradient(circle at 15% 10%, rgba(245, 158, 11, 0.14), transparent 34rem),
        radial-gradient(circle at 88% 18%, rgba(249, 115, 22, 0.12), transparent 32rem),
        radial-gradient(circle at 50% 100%, rgba(52, 211, 153, 0.08), transparent 30rem),
        linear-gradient(145deg, #101827 0%, #0a1020 48%, #121a2b 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at 50% 15%, black, transparent 75%);
    }

    ::selection { background: rgba(245, 158, 11, 0.35); color: #fff7ed; }

    .mono { font-family: 'JetBrains Mono', monospace; }

    .gradient-text {
      background: linear-gradient(135deg, #fde68a 0%, var(--neo-amber) 42%, var(--neo-orange) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 6px 18px rgba(245, 158, 11, 0.18));
    }

    .card,
    .note-card {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(32, 47, 73, 0.96), rgba(14, 23, 40, 0.96));
      border: 1px solid var(--neo-border);
      box-shadow:
        18px 18px 38px var(--neo-shadow-dark),
        -14px -14px 30px var(--neo-shadow-light),
        inset 1px 1px 0 rgba(255, 255, 255, 0.055);
      backdrop-filter: blur(18px) saturate(150%);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .card::before,
    .note-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.12), transparent 32%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.045), transparent 42%);
      opacity: 0.75;
    }

    .card > *,
    .note-card > * { position: relative; z-index: 1; }

    .card:hover,
    .note-card:hover {
      transform: translateY(-2px);
      border-color: rgba(245, 158, 11, 0.18);
      box-shadow:
        22px 22px 44px rgba(2, 6, 23, 0.86),
        -16px -16px 34px rgba(148, 163, 184, 0.16),
        0 0 0 1px rgba(245, 158, 11, 0.07),
        inset 1px 1px 0 rgba(255, 255, 255, 0.075);
    }

    .note-card {
      background:
        radial-gradient(circle at 20% 0%, rgba(245, 158, 11, 0.21), transparent 36%),
        linear-gradient(145deg, rgba(34, 45, 67, 0.98), rgba(12, 19, 32, 0.98));
      border-color: rgba(245, 158, 11, 0.16);
    }

    .btn-primary,
    button.btn-primary {
      background: linear-gradient(145deg, #fbbf24, #f97316) !important;
      color: #111827 !important;
      box-shadow:
        10px 10px 24px rgba(2, 6, 23, 0.62),
        -7px -7px 18px rgba(255, 255, 255, 0.08),
        inset 1px 1px 0 rgba(255, 255, 255, 0.45),
        inset -2px -2px 6px rgba(120, 53, 15, 0.28);
    }

    .btn-primary:hover,
    button.btn-primary:hover {
      transform: translateY(-2px);
      box-shadow:
        14px 14px 30px rgba(2, 6, 23, 0.72),
        -9px -9px 22px rgba(255, 255, 255, 0.10),
        0 0 28px rgba(245, 158, 11, 0.20),
        inset 1px 1px 0 rgba(255, 255, 255, 0.55);
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      box-shadow:
        8px 8px 18px rgba(2, 6, 23, 0.58),
        -6px -6px 14px rgba(148, 163, 184, 0.08),
        inset 1px 1px 0 rgba(255, 255, 255, 0.055);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        inset 7px 7px 14px rgba(2, 6, 23, 0.58),
        inset -5px -5px 12px rgba(148, 163, 184, 0.08);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: none;
      box-shadow:
        0 0 0 3px rgba(245, 158, 11, 0.22),
        0 0 0 1px var(--neo-ring),
        inset 6px 6px 14px rgba(2, 6, 23, 0.55),
        inset -5px -5px 12px rgba(148, 163, 184, 0.08) !important;
    }

    input,
    select,
    textarea,
    .neo-inset {
      color: var(--neo-text) !important;
      background: linear-gradient(145deg, #0b1220, #172238) !important;
      border: 1px solid rgba(255, 255, 255, 0.07) !important;
      box-shadow:
        inset 7px 7px 16px rgba(2, 6, 23, 0.72),
        inset -6px -6px 14px rgba(148, 163, 184, 0.075) !important;
    }

    input::placeholder { color: rgba(154, 168, 189, 0.72); }
    select option { color: #0f172a; background: #f8fafc; }

    header {
      background:
        linear-gradient(145deg, rgba(20, 30, 49, 0.88), rgba(8, 13, 25, 0.88)) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.075) !important;
      box-shadow:
        0 18px 42px rgba(2, 6, 23, 0.52),
        inset 0 -1px 0 rgba(255, 255, 255, 0.035);
      backdrop-filter: blur(18px) saturate(150%);
    }

    .rounded-lg,
    .rounded-xl,
    .rounded-2xl { border-radius: 1.25rem !important; }

    .bg-white\/5,
    .bg-white\/10,
    .bg-black\/30,
    .bg-black\/50 {
      background: linear-gradient(145deg, rgba(27, 41, 64, 0.82), rgba(9, 15, 27, 0.82)) !important;
      border: 1px solid rgba(255,255,255,0.055);
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.04),
        7px 7px 16px rgba(2, 6, 23, 0.45),
        -5px -5px 12px rgba(148, 163, 184, 0.055);
    }

    .border-white\/10 { border-color: rgba(255, 255, 255, 0.07) !important; }
    .text-gray-400 { color: var(--neo-muted) !important; }
    .text-gray-500 { color: var(--neo-faint) !important; }
    .text-green-400 { color: var(--neo-green) !important; }
    .text-red-400 { color: var(--neo-red) !important; }
    .text-amber-400, .text-amber-300 { color: #fbbf24 !important; }

    .bg-green-500\/20,
    .bg-red-500\/20,
    .bg-amber-500\/10,
    .bg-red-900\/20,
    .bg-red-900\/30 {
      box-shadow:
        inset 5px 5px 12px rgba(2, 6, 23, 0.55),
        inset -4px -4px 10px rgba(148, 163, 184, 0.07);
    }

    .slide-in { animation: slideIn 0.32s cubic-bezier(.21,.9,.28,.99); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(14px) scale(0.985); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .scan-line { animation: scan 2s linear infinite; }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    #root { min-height: 100vh; }

    [id^='qrcode'], canvas, img {
      border-radius: 1rem;
    }

    @media (max-width: 768px) {
      main { padding-top: 6rem !important; }
      .grid.grid-cols-3 { grid-template-columns: 1fr !important; }
      .grid.grid-cols-2 { grid-template-columns: 1fr !important; }
      .card, .note-card {
        box-shadow:
          12px 12px 26px rgba(2, 6, 23, 0.78),
          -8px -8px 18px rgba(148, 163, 184, 0.10),
          inset 1px 1px 0 rgba(255,255,255,0.055);
      }
      header .h-16 { height: auto; min-height: 4.5rem; padding-top: .7rem; padding-bottom: .7rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
