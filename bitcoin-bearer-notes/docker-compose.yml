version: "3.8"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://coinpack:coinpack@db:5432/coinpack}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32-char-key}
      - ENV=${ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coinpack
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-coinpack}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-coinpack}
      - POSTGRES_DB=${POSTGRES_DB:-coinpack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coinpack} -d ${POSTGRES_DB:-coinpack}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - coinpack
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - coinpack
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    volumes:
      - ./app:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    networks:
      - coinpack
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  coinpack:
    driver: bridge
