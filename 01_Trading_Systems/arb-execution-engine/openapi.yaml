openapi: 3.0.0
info:
  title: Arb Execution Engine API
  description: Solana arbitrage execution engine with truthful accounting
  version: 1.0.0
  contact:
    name: API Support
servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.arb-execution-engine.com
    description: Production

paths:
  /health:
    get:
      summary: Health check
      description: Check if the API is running
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time

  /trade:
    post:
      summary: Execute a trade
      description: Execute a single arbitrage trade with on-chain verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - inputMint
                - outputMint
                - amountLamports
              properties:
                inputMint:
                  type: string
                  example: So11111111111111111111111111111111111111112
                  description: Input token mint address
                outputMint:
                  type: string
                  example: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
                  description: Output token mint address
                amountLamports:
                  type: integer
                  example: 10000000
                  description: Amount in lamports
                slippageBps:
                  type: integer
                  example: 50
                  description: Slippage tolerance in basis points (1 = 0.01%)
                maxPriorityFee:
                  type: integer
                  example: 10000
                  description: Maximum priority fee in lamports
                dryRun:
                  type: boolean
                  example: false
                  description: If true, run without executing transaction (stops after signing)
      responses:
        '200':
          description: Trade executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeResult'
        '400':
          description: Bad request
        '500':
          description: Server error

  /trades:
    get:
      summary: Get trade history
      description: Retrieve recent trades from database
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Number of trades to return
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failed, dropped, killed, dry_run]
          description: Filter by status
      responses:
        '200':
          description: List of trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trade'

  /trades/{id}:
    get:
      summary: Get trade by ID
      description: Retrieve a specific trade by database ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Trade details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trade'
        '404':
          description: Trade not found

  /metrics:
    get:
      summary: Get performance metrics
      description: Calculate performance metrics from trade history
      responses:
        '200':
          description: Metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metrics'

# REMOVED: /scanner/opportunities endpoint
# 
# Exposing raw opportunities via API creates:
# - Race conditions (multiple users competing for same trade)
# - Stale signals (perishable by the time consumed)
# - Front-running risk
# - Self-competition (you become your own worst enemy)
#
# Architecture decision: Engine handles edge detection internally.
# API is for execution control and reporting, not signal distribution.
# This preserves alpha and prevents self-cannibalization.

components:
  schemas:
    TradeResult:
      type: object
      properties:
        token:
          type: string
          example: SOL→USDC
        input_amount:
          type: number
          example: 10000000
        expected_output:
          type: number
          nullable: true
          example: 9950000
        actual_output:
          type: number
          nullable: true
          example: 9900000
        expected_profit:
          type: number
          nullable: true
          example: 50000
        actual_profit:
          type: number
          nullable: true
          example: -50000
        latency_ms:
          type: number
          nullable: true
          example: 1250.5
        status:
          type: string
          enum:
            - submitted
            - success
            - failed
            - dropped
            - slippage_exceeded
            - timeout
            - insufficient_edge
            - killed
            - dry_run
          description: |
            submitted: Transaction sent to Jito, awaiting confirmation
            success: Transaction confirmed and profitable
            failed: Transaction failed (error details in error field)
            dropped: Transaction never landed (Jito accepted but not included)
            slippage_exceeded: Price moved beyond slippage tolerance
            timeout: Transaction confirmation timed out
            insufficient_edge: Expected profit below minimum threshold
            killed: Kill switch triggered (rolling PnL too low or win rate too low)
            dry_run: Test mode, transaction not sent
        error:
          type: string
          nullable: true
          example: Jito execution failed: insufficient funds
        transaction_id:
          type: string
          nullable: true
          example: 5j7s6i...
        priority_fee:
          type: number
          nullable: true
          example: 3000
          description: Priority fee in lamports

    Trade:
      type: object
      properties:
        id:
          type: integer
        token:
          type: string
        input_amount:
          type: number
        expected_output:
          type: number
          nullable: true
        actual_output:
          type: number
          nullable: true
        expected_profit:
          type: number
          nullable: true
        actual_profit:
          type: number
          nullable: true
        latency_ms:
          type: number
          nullable: true
        status:
          type: string
        error:
          type: string
          nullable: true
        transaction_id:
          type: string
          nullable: true
        priority_fee:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time

    Metrics:
      type: object
      properties:
        total_trades:
          type: integer
          example: 50
          description: Total number of trades executed
        successful_trades:
          type: integer
          example: 35
          description: Number of profitable trades
        win_rate:
          type: number
          format: float
          example: 0.7
          description: Percentage of successful trades (0.0 to 1.0)
        total_pnl_sol:
          type: number
          example: 0.005
          description: Total profit/loss in SOL (can be negative)
        avg_profit_sol:
          type: number
          example: 0.0001
          description: Average profit per trade in SOL (can be negative)
        avg_latency_ms:
          type: number
          example: 1250.5
          description: Average execution latency in milliseconds
        last_10_trades_pnl:
          type: number
          example: -0.001
          description: PnL of last 10 trades in SOL (for kill switch)
        dropped_rate:
          type: number
          format: float
          example: 0.1
          description: Percentage of trades that were dropped (never landed)

